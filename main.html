<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <!--font-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">



</head>
<body class="bg-white">
    <!--Navbar-->
    <nav class="flex justify-between items-center bg-white px-6 py-4 shadow">

    <div class="flex items-center gap-2">
        <img src="assets/github-logo.png" class="w-8">
        <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
    </div>
    <div class="flex gap-3 items-center">
        <div class="relative">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 absolute left-2 top-1/2 transform -translate-y-1/2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 1116.65 7.65a7.5 7.5 0 010 10.6z" />
            </svg>
            <input id="search-input"
                class="border px-8 py-2 rounded"
                placeholder="Search issues...">
        </div>
       <button id="search-button" onclick="searchIssues()" class="bg-blue-600 text-white px-4 py-2 rounded flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            New Issue
        </button>
    </div>
   </nav>

   <!--Container-->
   <div class="bg-white p-4 rounded shadow mb-4 flex gap-3">
  <button id="allTab" class="filter-btn px-5 py-2 rounded bg-blue-500 text-white"
          onclick="toggleTabStyle('allTab')">All</button>
  <button id="openTab" class="filter-btn px-5 py-2 rounded border text-gray-600"
          onclick="toggleTabStyle('openTab')">Open</button>
  <button id="closedTab" class="filter-btn px-5 py-2 rounded border text-gray-600"
          onclick="toggleTabStyle('closedTab')">Closed</button>
</div>

<!-- Issues Container -->
   <div class="card w-full bg-base-100 shadow-sm overflow-hidden">
                <div
                    class="flex sm:flex-row flex-col flex-wrap sm:gap-2 gap-3 sm:p-6 p-4 justify-between sm:items-center items-start border-b border-[#E4E4E7]">
                    <!-- left logo and text -->
                    <div class="flex items-center gap-2">
                        <div class="p-3 bg-[#ECE4FF] rounded-full flex justify-center items-center">
                            <img class="w-8" src="./assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <h5 id="total-issue-count" class="font-semibold sm:text-xl text-lg">0 Issues</h5>
                            <p class="text-[#64748B] font-normal sm:text-base text-sm">Track and manage your project
                                issues</p>
                        </div>
                    </div>
                    <!-- right status indicators -->
                <div class="flex justify-center items-center gap-4">
                        <div class="font-base text-[#1F2937] flex justify-center items-center gap-1">
                            <div class="w-3 h-3 bg-[#00A96E] rounded-full"></div><span>Open</span>
                        </div>
                        <div class="font-base text-[#1F2937] flex justify-center items-center gap-1">
                            <div class="w-3 h-3 bg-[#A855F7] rounded-full"></div>
                            Closed
                        </div>
                    </div>
                </div>

         <div id="loading-spinner" class="flex flex-col gap-4 justify-center items-center py-16 hidden">
                <span class="loading loading-spinner loading-xl"></span>
                <span class="skeleton skeleton-text">Loading issues...</span>
         </div>

        <div id="issue-container"
                    class="bg-[#FBFBFB] sm:p-6 p-4 grid xl:grid-cols-4 md:grid-cols-3 sm:grid-cols-2 grid-cols-1 gap-3">
                </div>
            </div>
        </div>

        <dialog id="my_modal_1" class="modal">
        <div class="modal-box">
            <h3 id="modal-title" class="text-lg font-bold"></h3>
            <div class="flex items-center gap-2 mt-2 flex-wrap">
                <div id="modal-status-badge"></div>
                <span class="text-[#64748B] text-sm">&bull;</span>
                <p id="modal-meta" class="text-[#64748B] text-sm"></p>
                <span class="text-[#64748B] text-sm">&bull;</span>
                <p id="modal-date" class="text-[#64748B] text-sm"></p>
            </div>
            <div id="modal-labels" class="flex flex-wrap gap-1 mt-3"></div>
            <p id="modal-description" class="py-4 text-[#64748B]"></p>
            <div class="border-t border-[#E4E4E7] pt-4 flex items-center gap-8">
                <div class="flex-1">
                    <p class="text-[#64748B] text-xs">Assignee:</p>
                    <p id="modal-assignee" class="font-semibold text-sm"></p>
                </div>
                <div class="flex-1">
                    <p class="text-[#64748B] text-xs">Priority:</p>
                    <div id="modal-priority" class="mt-1"></div>
                </div>
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn btn-primary bg-[#4A00FF] border-none shadow-none">Close</button>
                </form>
            </div>
        </div>
    </dialog>

 <script src="scripts/script.js"></script>
</body>
</html>
