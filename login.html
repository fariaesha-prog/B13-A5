<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Github Issue Tracker</title>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100">
    
<div class="bg-white p-8 rounded-xl shadow-md w-96 text-center">

<img src="assets/github-logo.png"
class="w-14 mx-auto mb-4">

<h2 class="text-xl font-semibold">GitHub Issues Tracker</h2>
<p class="text-gray-500 mb-6">Sign in to manage your issues</p>

<div class="text-left">
<label class="font-medium">Username</label>
<input id="username"
class="w-full border rounded-md p-2 mt-1 mb-1"
placeholder="Enter Username">

<p class="text-purple-600 text-sm mb-4">Default: admin</p>

<label class="font-medium">Password</label>
<input type="password"
id="password"
class="w-full border rounded-md p-2 mt-1 mb-1"
placeholder="Enter Password">

<p class="text-purple-600 text-sm mb-4">Default: admin123</p>

<button onclick="login()"
class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-2 rounded-md mt-2">
Sign In
</button>
</div>


<div class="flex items-center my-5">
  <hr class="flex-grow border-gray-300">
  <span class="mx-3 text-gray-400 text-sm">OR</span>
  <hr class="flex-grow border-gray-300">
</div>
 <p class="text-gray-400">Demo Credentials:</p>
<div class="bg-gray-100 p-3 rounded text-sm text-left">
   
    <p><strong>Username:</strong> admin</p>
    <p><strong>Password:</strong> admin123</p>
</div>

</div>

<script src="login.js"></script>
    
</body>
</html>
