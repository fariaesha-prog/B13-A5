<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!--Navbar-->
    <nav class="flex justify-between items-center bg-white px-6 py-4 shadow">

    <div class="flex items-center gap-2">
        <img src="assets/github-logo.png" class="w-8">
        <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
    </div>
    <div class="flex gap-3">
        <input id="searchInput"
        class="border px-3 py-2 rounded"
        placeholder="Search issues...">
        <button onclick="searchIssues()"class="bg-purple-600 text-white px-4 py-2 rounded">New Issue</button>
    </div>
   </nav>
    
    <!-- filter tabs -->
    <div class="bg-white p-4 rounded shadow mb-4 flex gap-3">
      <button id="allTab" onclick="switchTab('all')" class="tab-btn px-5 py-2 rounded bg-blue-600 text-white">All</button>
      <button id="openTab" onclick="switchTab('open')" class="tab-btn px-5 py-2 rounded border text-gray-600">Open</button>
      <button id="closedTab" onclick="switchTab('closed')" class="tab-btn px-5 py-2 rounded border text-gray-600">Closed</button>
    </div>

    <!-- issue cards will be injected here -->
    <div id="issuesContainer" class="p-4 space-y-4"></div>

    <script src="scripts/script.js"></script>
</body>
</html>
